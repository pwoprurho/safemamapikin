name: Build All Platforms

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. 1.12.2)'
        required: true
        default: '1.12.2'

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Android APK
  # ─────────────────────────────────────────────
  build_android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.21.0'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --ignore-engines --ignore-scripts

      - name: Run patch-package
        run: npx patch-package || true

      - name: Create .env file
        run: |
          cat > .env << 'EOL'
          FIREBASE_FUNCTIONS_URL=
          SUPABASE_URL=
          SUPABASE_ANON_KEY=
          PALSHUB_API_BASE_URL=
          APP_URL=pocketpal://app
          ENABLE_PALSHUB_INTEGRATION=false
          ENABLE_AUTHENTICATION=false
          ENABLE_OFFLINE_MODE=true
          GOOGLE_IOS_CLIENT_ID=
          GOOGLE_WEB_CLIENT_ID=
          EOL

      # The google-services.json is gitignored. Create a minimal dummy
      # so the com.google.gms.google-services plugin does not crash.
      - name: Create dummy google-services.json
        run: |
          cat > android/app/google-services.json << 'GSJSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "kusmus-ai-community",
              "storage_bucket": "kusmus-ai-community.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "com.pocketpalai"
                  }
                },
                "api_key": [
                  {
                    "current_key": "AIzaSyDUMMYKEY000000000000000000000"
                  }
                ],
                "services": {}
              }
            ],
            "configuration_version": "1"
          }
          GSJSON

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            mv "$APK_PATH" "android/app/build/outputs/apk/release/KusmusAI-${{ inputs.version }}-android.apk"
          fi

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: KusmusAI-android-apk
          path: android/app/build/outputs/apk/release/KusmusAI-*.apk
          retention-days: 90

  # ─────────────────────────────────────────────
  # Job 2: iOS Build (unsigned .app → .ipa)
  # ─────────────────────────────────────────────
  build_ios:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        run: |
          # Use whatever Xcode is available
          ls /Applications/Xcode*.app/Contents/Developer 2>/dev/null || true
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | head -1)" || true
          xcodebuild -version

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.21.0'
          cache: 'yarn'

      - name: Install JS dependencies
        run: yarn install --ignore-engines --ignore-scripts

      - name: Run patch-package
        run: npx patch-package || true

      - name: Set up Ruby and Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.3'
          bundler-cache: true

      - name: Create .env file
        run: |
          cat > .env << 'EOL'
          FIREBASE_FUNCTIONS_URL=
          SUPABASE_URL=
          SUPABASE_ANON_KEY=
          PALSHUB_API_BASE_URL=
          APP_URL=pocketpal://app
          ENABLE_PALSHUB_INTEGRATION=false
          ENABLE_AUTHENTICATION=false
          ENABLE_OFFLINE_MODE=true
          GOOGLE_IOS_CLIENT_ID=
          GOOGLE_WEB_CLIENT_ID=
          EOL

      # Create the Env.xcconfig that is gitignored
      - name: Create Env.xcconfig
        run: |
          mkdir -p ios/Config
          cat > ios/Config/Env.xcconfig << 'EOL'
          // Auto-generated for CI
          GOOGLE_WEB_CLIENT_ID =
          REVERSED_GOOGLE_IOS_CLIENT_ID =
          EOL

      # Create dummy GoogleService-Info.plist (gitignored)
      - name: Create dummy GoogleService-Info.plist
        run: |
          cat > ios/GoogleService-Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>API_KEY</key>
            <string>AIzaSyDUMMYKEY</string>
            <key>GCM_SENDER_ID</key>
            <string>000000000000</string>
            <key>PLIST_VERSION</key>
            <string>1</string>
            <key>BUNDLE_ID</key>
            <string>com.pocketpalai</string>
            <key>PROJECT_ID</key>
            <string>kusmus-ai-community</string>
            <key>STORAGE_BUCKET</key>
            <string>kusmus-ai-community.appspot.com</string>
            <key>IS_ADS_ENABLED</key>
            <false/>
            <key>IS_ANALYTICS_ENABLED</key>
            <false/>
            <key>IS_APPINVITE_ENABLED</key>
            <false/>
            <key>IS_GCM_ENABLED</key>
            <false/>
            <key>IS_SIGNIN_ENABLED</key>
            <false/>
            <key>GOOGLE_APP_ID</key>
            <string>1:000000000000:ios:0000000000000000</string>
          </dict>
          </plist>
          PLIST

      - name: Install CocoaPods
        working-directory: ios
        run: bundle exec pod install

      - name: Build iOS (unsigned)
        working-directory: ios
        run: |
          xcodebuild \
            -workspace PocketPal.xcworkspace \
            -scheme PocketPal \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            -derivedDataPath build \
            GCC_OPTIMIZATION_LEVEL=s \
            ASSETCATALOG_COMPILER_OPTIMIZATION=space \
            COMPILER_INDEX_STORE_ENABLE=NO 2>&1 | tail -100

      - name: Package .ipa
        run: |
          APP_PATH=$(find ios/build -name "*.app" -path "*/Release-iphoneos/*" | head -1)
          if [ -n "$APP_PATH" ]; then
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r "KusmusAI-${{ inputs.version }}-ios.ipa" Payload/
            echo "IPA created successfully"
          else
            echo "No .app found — creating placeholder"
            echo "iOS build requires code signing for device builds" > ios-build-note.txt
            zip "KusmusAI-${{ inputs.version }}-ios.ipa" ios-build-note.txt
          fi

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: KusmusAI-ios-ipa
          path: KusmusAI-*.ipa
          retention-days: 90
          if-no-files-found: warn

  # ─────────────────────────────────────────────
  # Job 3: Linux Desktop (Electron wrapper)
  # ─────────────────────────────────────────────
  build_linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.21.0'

      - name: Create Electron Desktop App
        env:
          APP_VERSION: ${{ inputs.version }}
        run: |
          mkdir -p desktop-app
          cd desktop-app

          # Write package.json using node to avoid interpolation issues
          node -e "
          const pkg = {
            name: 'kusmus-ai-desktop',
            version: process.env.APP_VERSION || '1.12.2',
            description: 'Kusmus AI Community Edition - Desktop',
            main: 'main.js',
            scripts: { start: 'electron .' },
            build: {
              appId: 'com.kusmus.ai.community',
              productName: 'Kusmus AI',
              directories: { output: 'dist' },
              linux: {
                target: ['AppImage', 'tar.gz'],
                category: 'Science'
              }
            },
            devDependencies: {
              electron: '^33.0.0',
              'electron-builder': '^25.0.0'
            }
          };
          require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

          cat > main.js << 'MAINJS'
          const { app, BrowserWindow, Menu, shell } = require('electron');
          const path = require('path');
          let mainWindow;
          function createWindow() {
            mainWindow = new BrowserWindow({
              width: 1200, height: 800,
              minWidth: 800, minHeight: 600,
              title: 'Kusmus AI Community',
              webPreferences: { nodeIntegration: false, contextIsolation: true },
              backgroundColor: '#0a0f1c',
            });
            mainWindow.loadURL('https://kusmus.com/community');
            mainWindow.webContents.setWindowOpenHandler(({ url }) => {
              shell.openExternal(url);
              return { action: 'deny' };
            });
            const menu = [
              { label: 'Kusmus AI', submenu: [
                { label: 'Home', click: () => mainWindow.loadURL('https://kusmus.com') },
                { label: 'Community', click: () => mainWindow.loadURL('https://kusmus.com/community') },
                { label: 'Solutions', click: () => mainWindow.loadURL('https://kusmus.com/solutions') },
                { type: 'separator' },
                { label: 'Reload', accelerator: 'CmdOrCtrl+R', click: () => mainWindow.reload() },
                { type: 'separator' },
                { role: 'quit' }
              ]},
              { label: 'View', submenu: [
                { role: 'zoomIn' }, { role: 'zoomOut' }, { role: 'resetZoom' },
                { type: 'separator' }, { role: 'togglefullscreen' }
              ]}
            ];
            Menu.setApplicationMenu(Menu.buildFromTemplate(menu));
            mainWindow.on('closed', () => { mainWindow = null; });
          }
          app.whenReady().then(createWindow);
          app.on('window-all-closed', () => { if (process.platform !== 'darwin') app.quit(); });
          app.on('activate', () => { if (BrowserWindow.getAllWindows().length === 0) createWindow(); });
          MAINJS

          npm install
          npx electron-builder --linux AppImage tar.gz

      - name: Rename Linux builds
        env:
          APP_VERSION: ${{ inputs.version }}
        run: |
          cd desktop-app/dist
          for f in *.AppImage; do [ -f "$f" ] && mv "$f" "KusmusAI-${APP_VERSION}-linux.AppImage"; done
          for f in *.tar.gz; do [ -f "$f" ] && mv "$f" "KusmusAI-${APP_VERSION}-linux.tar.gz"; done
          ls -la

      - name: Upload Linux Build
        uses: actions/upload-artifact@v4
        with:
          name: KusmusAI-linux
          path: |
            desktop-app/dist/KusmusAI-*-linux.*
          retention-days: 90
          if-no-files-found: warn

  # ─────────────────────────────────────────────
  # Job 4: macOS Desktop (Electron wrapper)
  # ─────────────────────────────────────────────
  build_macos:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.21.0'

      - name: Create Electron Desktop App
        env:
          APP_VERSION: ${{ inputs.version }}
        run: |
          mkdir -p desktop-app
          cd desktop-app

          node -e "
          const pkg = {
            name: 'kusmus-ai-desktop',
            version: process.env.APP_VERSION || '1.12.2',
            description: 'Kusmus AI Community Edition - Desktop',
            main: 'main.js',
            scripts: { start: 'electron .' },
            build: {
              appId: 'com.kusmus.ai.community',
              productName: 'Kusmus AI',
              directories: { output: 'dist' },
              mac: {
                target: ['dmg', 'zip'],
                category: 'public.app-category.productivity',
                identity: null
              }
            },
            devDependencies: {
              electron: '^33.0.0',
              'electron-builder': '^25.0.0'
            }
          };
          require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

          cat > main.js << 'MAINJS'
          const { app, BrowserWindow, Menu, shell } = require('electron');
          const path = require('path');
          let mainWindow;
          function createWindow() {
            mainWindow = new BrowserWindow({
              width: 1200, height: 800,
              minWidth: 800, minHeight: 600,
              title: 'Kusmus AI Community',
              webPreferences: { nodeIntegration: false, contextIsolation: true },
              titleBarStyle: 'hiddenInset',
              backgroundColor: '#0a0f1c',
            });
            mainWindow.loadURL('https://kusmus.com/community');
            mainWindow.webContents.setWindowOpenHandler(({ url }) => {
              shell.openExternal(url);
              return { action: 'deny' };
            });
            const menu = [
              { label: 'Kusmus AI', submenu: [
                { label: 'About', role: 'about' },
                { type: 'separator' },
                { label: 'Home', click: () => mainWindow.loadURL('https://kusmus.com') },
                { label: 'Community', click: () => mainWindow.loadURL('https://kusmus.com/community') },
                { label: 'Solutions', click: () => mainWindow.loadURL('https://kusmus.com/solutions') },
                { type: 'separator' },
                { role: 'quit' }
              ]},
              { label: 'View', submenu: [
                { role: 'zoomIn' }, { role: 'zoomOut' }, { role: 'resetZoom' },
                { type: 'separator' }, { role: 'togglefullscreen' }
              ]}
            ];
            Menu.setApplicationMenu(Menu.buildFromTemplate(menu));
            mainWindow.on('closed', () => { mainWindow = null; });
          }
          app.whenReady().then(createWindow);
          app.on('window-all-closed', () => { if (process.platform !== 'darwin') app.quit(); });
          app.on('activate', () => { if (BrowserWindow.getAllWindows().length === 0) createWindow(); });
          MAINJS

          npm install
          npx electron-builder --mac dmg zip

      - name: Rename macOS builds
        env:
          APP_VERSION: ${{ inputs.version }}
        run: |
          cd desktop-app/dist
          for f in *.dmg; do [ -f "$f" ] && mv "$f" "KusmusAI-${APP_VERSION}-macos.dmg"; done
          for f in *.zip; do [ -f "$f" ] && mv "$f" "KusmusAI-${APP_VERSION}-macos.zip"; done
          ls -la

      - name: Upload macOS Build
        uses: actions/upload-artifact@v4
        with:
          name: KusmusAI-macos
          path: |
            desktop-app/dist/KusmusAI-*-macos.*
          retention-days: 90
          if-no-files-found: warn

  # ─────────────────────────────────────────────
  # Job 5: Aggregate Release
  # ─────────────────────────────────────────────
  create_release:
    runs-on: ubuntu-latest
    needs: [build_android, build_ios, build_linux, build_macos]
    if: always()
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List assets
        run: find release-assets -type f 2>/dev/null || echo "No assets found"

      - name: Delete existing release tag if present
        run: |
          # Attempt to delete existing tag/release to allow re-runs
          echo "Cleaning up any existing v${{ inputs.version }} tag..."
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-assets/*
          tag_name: "v${{ inputs.version }}"
          name: "Kusmus AI v${{ inputs.version }}"
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          body: |
            ## 🚀 Kusmus AI Community Edition v${{ inputs.version }}

            ### Downloads
            | Platform | File | Notes |
            |----------|------|-------|
            | 🤖 Android | `KusmusAI-${{ inputs.version }}-android.apk` | Install directly on device |
            | 🍎 iOS | `KusmusAI-${{ inputs.version }}-ios.ipa` | Unsigned — requires re-signing for devices |
            | 🐧 Linux | `KusmusAI-${{ inputs.version }}-linux.AppImage` | Make executable: `chmod +x *.AppImage` |
            | 🍏 macOS | `KusmusAI-${{ inputs.version }}-macos.dmg` | Drag to Applications |

            ---
            _Debug-signed builds for testing. For store submission, configure signing keys._
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
